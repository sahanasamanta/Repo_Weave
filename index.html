<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI-Powered Code Analyzer</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            max-width: 1200px;
            margin: 0 auto;
        }

        .header {
            text-align: center;
            color: white;
            margin-bottom: 30px;
        }

        .header h1 {
            font-size: 2.5em;
            margin-bottom: 10px;
        }

        .header p {
            font-size: 1.2em;
            opacity: 0.9;
        }

        .input-section {
            background: white;
            border-radius: 10px;
            padding: 30px;
            margin-bottom: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        .input-group {
            display: flex;
            gap: 10px;
        }

        input {
            flex: 1;
            padding: 15px;
            border: 2px solid #e0e0e0;
            border-radius: 8px;
            font-size: 16px;
            transition: border-color 0.3s;
        }

        input:focus {
            outline: none;
            border-color: #667eea;
        }

        button {
            padding: 15px 30px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.3s;
        }

        button:hover {
            background: #5a67d8;
        }

        button:disabled {
            background: #cbd5e0;
            cursor: not-allowed;
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 30px;
        }

        .stat-card {
            background: white;
            padding: 20px;
            border-radius: 10px;
            text-align: center;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        .stat-card h3 {
            font-size: 2em;
            color: #667eea;
            margin-bottom: 5px;
        }

        .stat-card p {
            color: #718096;
            font-size: 0.9em;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .tabs {
            display: flex;
            gap: 10px;
            margin-bottom: 20px;
        }

        .tab {
            padding: 12px 24px;
            background: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            color: #4a5568;
            cursor: pointer;
            transition: all 0.3s;
            opacity: 0.7;
        }

        .tab.active {
            background: #667eea;
            color: white;
            opacity: 1;
        }

        .content-section {
            background: white;
            border-radius: 10px;
            padding: 30px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            min-height: 400px;
        }

        .issues-list, .suggestions-list {
            display: flex;
            flex-direction: column;
            gap: 15px;
        }

        .issue-item {
            border: 1px solid #e0e0e0;
            border-radius: 8px;
            padding: 20px;
            background: #fafafa;
        }

        .issue-title {
            font-weight: 600;
            color: #e53e3e;
            margin-bottom: 10px;
        }

        .suggestion-item {
            border-left: 4px solid #667eea;
            background: #f0f4ff;
            padding: 20px;
            border-radius: 8px;
        }

        .suggestion-explanation {
            margin: 10px 0;
            line-height: 1.6;
            color: #4a5568;
        }

        .code-example {
            background: #2d3748;
            color: #e2e8f0;
            padding: 15px;
            border-radius: 6px;
            font-family: 'Courier New', monospace;
            font-size: 14px;
            overflow-x: auto;
            white-space: pre-wrap;
        }

        .loading {
            text-align: center;
            padding: 40px;
        }

        .loading-spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 50px;
            height: 50px;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .error-message {
            background: #fed7d7;
            color: #c53030;
            padding: 15px;
            border-radius: 8px;
            margin-bottom: 20px;
        }

        .graph-placeholder {
            background: #f7fafc;
            border: 2px dashed #cbd5e0;
            border-radius: 8px;
            padding: 40px;
            text-align: center;
            color: #718096;
        }

        .graph-placeholder a {
            color: #667eea;
            text-decoration: none;
            font-weight: 600;
            display: inline-block;
            margin: 10px;
            padding: 10px 20px;
            background: #667eea;
            color: white;
            border-radius: 8px;
        }

        .graph-placeholder a:hover {
            background: #5a67d8;
            text-decoration: none;
        }

        .graph-placeholder a.secondary {
            background: #48bb78;
        }

        .graph-placeholder a.secondary:hover {
            background: #38a169;
        }

        footer {
            text-align: center;
            margin-top: 30px;
            color: white;
            opacity: 0.8;
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>🔍 AI-Powered Code Analyzer</h1>
            <p>Analyze any GitHub repository and get AI-powered fixes</p>
        </div>

        <div class="input-section">
            <div class="input-group">
                <input 
                    type="text" 
                    id="repoUrl" 
                    placeholder="Enter GitHub repository URL (e.g., https://github.com/username/repo)"
                    value="https://github.com/sahanasamanta/AI-Powered-X-Ray-Report-Generator-"
                >
                <button id="analyzeBtn" onclick="analyzeRepo()">Analyze</button>
            </div>
        </div>

        <div id="stats" style="display: none;">
            <div class="stats-grid" id="statsGrid"></div>

            <div class="tabs">
                <button class="tab active" onclick="switchTab('issues', event)">Issues (0)</button>
                <button class="tab" onclick="switchTab('suggestions', event)">AI Suggestions</button>
                <button class="tab" onclick="switchTab('graph', event)">Graph</button>
            </div>

            <div class="content-section">
                <div id="issues-tab" class="tab-content"></div>
                <div id="suggestions-tab" class="tab-content" style="display: none;"></div>
                <div id="graph-tab" class="tab-content" style="display: none;"></div>
            </div>
        </div>

        <div id="loading" style="display: none;" class="loading">
            <div class="loading-spinner"></div>
            <p>Analyzing repository... This may take a few seconds...</p>
        </div>

        <div id="error" style="display: none;" class="error-message"></div>

        <footer>
            <p>Powered by AWS Bedrock • Nova Pro • Serverless Framework</p>
        </footer>
    </div>

    <script>
        const API_URL = 'https://74zmv7bxta.execute-api.us-east-1.amazonaws.com/dev/analyze';
        let currentData = null;

        async function analyzeRepo() {
            const repoUrl = document.getElementById('repoUrl').value.trim();
            if (!repoUrl) {
                showError('Please enter a GitHub repository URL');
                return;
            }

            // Show loading, hide previous results
            document.getElementById('loading').style.display = 'block';
            document.getElementById('stats').style.display = 'none';
            document.getElementById('error').style.display = 'none';
            document.getElementById('analyzeBtn').disabled = true;

            try {
                const response = await fetch(API_URL, {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({ repo_url: repoUrl })
                });

                const data = await response.json();

                if (!response.ok) {
                    throw new Error(data.error || 'Analysis failed');
                }

                currentData = data;
                displayResults(data);

            } catch (error) {
                showError(error.message);
            } finally {
                document.getElementById('loading').style.display = 'none';
                document.getElementById('analyzeBtn').disabled = false;
            }
        }

        function displayResults(data) {
            // Show stats section
            document.getElementById('stats').style.display = 'block';

            // Update stats grid
            const stats = data.summary;
            document.getElementById('statsGrid').innerHTML = `
                <div class="stat-card">
                    <h3>${stats.python_files}</h3>
                    <p>Python Files</p>
                </div>
                <div class="stat-card">
                    <h3>${stats.functions}</h3>
                    <p>Functions</p>
                </div>
                <div class="stat-card">
                    <h3>${stats.calls}</h3>
                    <p>Function Calls</p>
                </div>
                <div class="stat-card">
                    <h3>${stats.issues}</h3>
                    <p>Issues Found</p>
                </div>
            `;

            // Update tab counts
            document.querySelectorAll('.tab')[0].textContent = `Issues (${stats.issues})`;

            // Display issues
            displayIssues(data.issues);

            // Display AI suggestions
            displaySuggestions(data.ai_fixes);

            // Show first tab by default
            switchTab('issues', null);
        }

        function displayIssues(issues) {
            const container = document.getElementById('issues-tab');
            if (!issues || issues.length === 0) {
                container.innerHTML = '<p>No issues found!</p>';
                return;
            }

            container.innerHTML = '<div class="issues-list">' + 
                issues.map(issue => `
                    <div class="issue-item">
                        <div class="issue-title">⚠️ ${escapeHtml(issue)}</div>
                    </div>
                `).join('') + 
            '</div>';
        }

        function displaySuggestions(aiFixes) {
            const container = document.getElementById('suggestions-tab');
            
            if (!aiFixes || !aiFixes.suggestions || aiFixes.suggestions.length === 0) {
                container.innerHTML = '<p>No AI suggestions available.</p>';
                return;
            }

            container.innerHTML = '<div class="suggestions-list">' + 
                aiFixes.suggestions.map(suggestion => `
                    <div class="suggestion-item">
                        <div style="font-weight: 600; color: #667eea;">🔧 ${escapeHtml(suggestion.issue)}</div>
                        <div class="suggestion-explanation">${escapeHtml(suggestion.explanation)}</div>
                        ${suggestion.code_example ? 
                            `<div class="code-example">${escapeHtml(suggestion.code_example)}</div>` : 
                            ''}
                    </div>
                `).join('') + 
            '</div>';
        }

        function switchTab(tabName, event) {
            // Update tab buttons if event exists
            if (event) {
                document.querySelectorAll('.tab').forEach(tab => tab.classList.remove('active'));
                event.target.classList.add('active');
            }

            // Hide all tabs
            document.getElementById('issues-tab').style.display = 'none';
            document.getElementById('suggestions-tab').style.display = 'none';
            document.getElementById('graph-tab').style.display = 'none';

            // Show selected tab
            document.getElementById(`${tabName}-tab`).style.display = 'block';

            // Load graph if needed
            if (tabName === 'graph' && currentData) {
                displayGraph();
            }
        }

        function displayGraph() {
            const container = document.getElementById('graph-tab');
    
            if (!currentData || !currentData.graph) {
                container.innerHTML = '<p>Graph data not available.</p>';
                return;
            }

            container.innerHTML = `
                <div class="graph-placeholder">
                    <h3>📊 Dependency Graph</h3>
                    <p>Your graph has ${currentData.graph.nodes.length} nodes and ${currentData.graph.edges.length} edges.</p>
                    <p style="margin-top: 20px;">
                        <a href="REPOWEAVE/dependency_graph.png" target="_blank">📷 View Static Graph (PNG)</a><br>
                        <a href="REPOWEAVE/dependency_graph.html" target="_blank">🌐 View Interactive Graph (HTML)</a>
                    </p>
                    <p style="margin-top: 20px; font-size: 14px;">
                        Graph files are generated in the Lambda environment.<br>
                        For demo purposes, the structure is shown in JSON format above.
                    </p>
                </div>
            `;
        }
        function showError(message) {
            const errorDiv = document.getElementById('error');
            errorDiv.textContent = `Error: ${message}`;
            errorDiv.style.display = 'block';
        }

        function escapeHtml(unsafe) {
            if (!unsafe) return '';
            return unsafe
                .replace(/&/g, "&amp;")
                .replace(/</g, "&lt;")
                .replace(/>/g, "&gt;")
                .replace(/"/g, "&quot;")
                .replace(/'/g, "&#039;");
        }

        // Auto-analyze on page load (optional)
        window.onload = function() {
            // Uncomment to auto-analyze on load
            // analyzeRepo();
        };
    </script>
</body>
</html>
